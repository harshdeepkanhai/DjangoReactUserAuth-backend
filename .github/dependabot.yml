version: 2
updates:
  # Python dependencies — now split across requirements/*.txt (was the root
  # requirements.txt that Dependabot used to scan).
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python:
        patterns:
          - "*"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Base image in the Dockerfile.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
